# wrangler.toml
# ─────────────
# Cloudflare Worker configuration for the canary relay.
# Deploy with:  wrangler deploy
#
# DO NOT put secrets here — use:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put GITHUB_OWNER
#   wrangler secret put GITHUB_REPO

name            = "canary-relay"
main            = "canary-relay-worker.js"
compatibility_date = "2024-01-01"

# Free tier: 100,000 requests/day, 10ms CPU time per request
# Both limits are far beyond what a canary trap will ever need.

# Optional: bind a custom domain in the Cloudflare dashboard instead of
# using the default  https://canary-relay.<subdomain>.workers.dev  URL.
# A custom domain makes the bait URL look more convincing.
#
# [env.production]
# routes = [{ pattern = "api.yoursite.com/webhook", zone_name = "yoursite.com" }]
